name: MobGearScaling — Build and Publish

on:
  push:
    branches: [ main ]
    tags:
      - 'mob-gear-scaling-v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      mod_version: ${{ steps.props.outputs.mod_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read mod version
        id: props
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          echo "mod_version=${MOD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build mob-gear-scaling jar
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mob-gear-scaling-jar
          path: build/libs/mob-gear-scaling-${{ steps.props.outputs.mod_version }}.jar
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mob-gear-scaling-v')
    outputs:
      modrinth_version_id: ${{ steps.publish.outputs.modrinth_version_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: mob-gear-scaling-jar
          path: build/libs/

      - name: Publish to Modrinth
        id: publish
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          MOD_VERSION: ${{ needs.build.outputs.mod_version }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          JAR_FILE="build/libs/mob-gear-scaling-${MOD_VERSION}.jar"
          MODRINTH_ID=$(grep '^modrinth_id=' gradle.properties | cut -d'=' -f2)

          DATA=$(MODRINTH_ID="$MODRINTH_ID" python3 -c "
          import json, os
          data = {
              'name': 'MobGearScaling ${TAG}',
              'version_number': '${TAG}',
              'version_type': 'release',
              'project_id': os.environ['MODRINTH_ID'],
              'dependencies': [],
              'game_versions': ['1.20.1'],
              'loaders': ['forge'],
              'featured': True,
              'file_parts': ['jar']
          }
          print(json.dumps(data))
          ")

          RESPONSE=$(curl -sf \
            -H "Authorization: ${MODRINTH_API_TOKEN}" \
            -F "data=${DATA}" \
            -F "jar=@${JAR_FILE};type=application/java-archive" \
            "https://api.modrinth.com/v2/version")

          MODRINTH_VERSION_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Published to Modrinth: version_id=${MODRINTH_VERSION_ID}"
          echo "modrinth_version_id=${MODRINTH_VERSION_ID}" >> "$GITHUB_OUTPUT"

      - name: Update Modrinth project categories
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
        run: |
          MODRINTH_ID=$(grep '^modrinth_id=' gradle.properties | cut -d'=' -f2)
          curl -sf -X PATCH \
            -H "Authorization: ${MODRINTH_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"categories": ["mobs"]}' \
            "https://api.modrinth.com/v2/project/${MODRINTH_ID}"

  update-modpack:
    needs: [build, publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mob-gear-scaling-v')

    steps:
      - name: Trigger modpack update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MODPACK_DISPATCH_TOKEN }}
          repository: infrastructureSickos/minecraft-modpack
          event-type: mob-gear-scaling-updated
          client-payload: '{"version": "${{ github.ref_name }}"}'
